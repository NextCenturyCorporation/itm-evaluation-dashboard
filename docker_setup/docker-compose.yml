version: '3'

networks:
  dashboard-net:

services:
  nginx:
    image: nginx:latest
    restart: always
    container_name: dashboard-nginx
    volumes:
      - ./resources/nginx.conf:/etc/nginx/nginx.conf
      - ./certs:/certs
      - ./nginxpwd:/nginxpwd
    ports:
      - "80:80"
      - "443:443"
    networks:
      - dashboard-net
    depends_on:
      - dashboard-ui
      - dashboard-server

  dashboard-ui:
    build:
      context: ../dashboard-ui
      target: runtime
      args:
        PUBLIC_URL: /
        CONFIG_PATH: public/configs/prod/config.js
        PORT_ARG: 3000
        USE_CORP_CA: "false"
    image: dashboard-ui:prod
    container_name: dashboard-ui
    restart: always
    ports:
      - 3000:3000
    depends_on:
      - dashboard-server
    networks:
      - dashboard-net

  dashboard-server:
    container_name: dashboard-graphql
    image: dashboard-graphql
    restart: always
    volumes:
      - ../dashboard-ui/public/configs/prod/graphql-config.js:/usr/src/app/config.js
      - $HOME/.aws/:/root/.aws/:ro
    ports: 
      - 9100:9100
    expose:
      - 9100
    depends_on:
      - dashboard-mongo
    networks:
      - dashboard-net
    environment:
      NODE_OPTIONS: "--max-old-space-size=16384"
      NODE_ENV: "production"

  dashboard-mongo: 
    image: 'mongo'
    restart: always
    container_name: dashboard-mongo
    command: --port 27030
    networks:
      dashboard-net:
    environment:
      - MONGO_INITDB_DATABASE=dashboard
      - MONGO_INITDB_ROOT_USERNAME=dashroot
      - MONGO_INITDB_ROOT_PASSWORD=dashr00tp@ssw0rd
    volumes:
      - ./resources/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - '27030:27030'
