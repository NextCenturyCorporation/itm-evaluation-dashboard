user  nginx;
worker_processes  1;

events {
    worker_connections 1024; 
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  keepalive_timeout 65;

  resolver 127.0.0.11 ipv6=off;

  server {
    listen 80;
    server_name _;

    # UI (now nginx runtime on port 80 inside dashboard-ui container)
    location / {
      proxy_pass http://dashboard-ui:80/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # If you still use /dashboard/ explicitly
    location /dashboard/ {
      proxy_pass http://dashboard-ui:80$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GraphQL API
    location ^~ /api/ {
      proxy_pass http://dashboard-graphql:9100;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_read_timeout 900;
    }
  }
}
